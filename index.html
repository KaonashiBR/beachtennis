<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#004e98">
    
    <title>BT Manager - Arena Dashboard</title>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body class="viewer-mode">

    <div id="loading">
        <div style="font-size:3.5em;">🎾</div><b>A Carregar...</b>
    </div>

    <div class="navbar">
        <div class="nav-logo" onclick="window.goHome()">
            <span>🎾</span>
            <div>BT Manager <br><small style="font-weight:400; color:#666;">por Lucas Sibie</small></div>
        </div>
        <div class="nav-user" onclick="openLoginModal()">
            <span id="nav-username" class="user-name">Visitante</span>
            <img id="nav-avatar" class="user-avatar" src="https://cdn-icons-png.flaticon.com/512/847/847969.png">
        </div>
    </div>

    <div id="screen-arenas" class="screen active">
        <div class="header-bar">
            <h2 class="section-title">Minhas Arenas</h2>
        </div>
        <div id="grid-arenas" class="grid-container"></div>
        <button id="btn-add-arena" class="btn-add-float" onclick="openModal('arena')" style="display:none;">+</button>
    </div>

    <div id="screen-categories" class="screen">
        <div class="back-btn" onclick="showScreen('screen-arenas')">
            <span class="material-icons">arrow_back</span> Voltar para Arenas
        </div>
        <div class="header-bar">
            <div>
                <h2 class="section-title" id="title-arena">Nome Arena</h2>
            </div>
        </div>

        <div class="app-tabs">
            <div class="app-tab active" onclick="switchCatTab('cats')">CATEGORIAS</div>
            <div class="app-tab" onclick="switchCatTab('arena-rank')">RANKING GERAL DA ARENA</div>
        </div>

        <div id="tab-cats" class="tab-content active">
            <div id="grid-categories" class="grid-container"></div>
        </div>

        <div id="tab-arena-rank" class="tab-content" style="display:none;">
            <div style="background:white; border-radius:12px; overflow:hidden; border:1px solid #ddd; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                <table class="rank-table" id="table-arena-ranking">
                    </table>
            </div>
        </div>
        
        <button id="btn-add-cat" class="btn-add-float" onclick="openModal('category')" style="display:none;">+</button>
    </div>

    <div id="admin-player-controls" style="display:none;">
        <input type="text" id="pName" class="inp-std" placeholder="Nome do Atleta">
        <input type="tel" id="pPhone" class="inp-std" placeholder="Telefone (Clique para buscar)" onclick="window.openAtletaSuggest()" readonly>
        <button class="btn-std btn-org" onclick="window.addPlayer()">Adicionar</button>
    </div>

    <div id="modal-player-suggest" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h3 class="modal-title">Atletas Registrados</h3>
            <p style="font-size: 0.8em; color: #666;">Selecione um atleta para preencher automaticamente.</p>
            <div id="suggest-list" class="select-list">
                </div>
            <button class="btn-std btn-red" onclick="window.closeSuggest()" style="margin-top:15px;">Cancelar</button>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h3 id="modal-h3">Criar Novo</h3>
            <input type="hidden" id="modal-type">
            <input type="hidden" id="modal-id">
            
            <label class="modal-label">Nome</label>
            <input type="text" id="inp-name" class="inp-std">
            
            <div id="field-arena" style="display:none;">
                <label class="modal-label">URL da Imagem</label>
                <input type="text" id="inp-url" class="inp-std">
            </div>

            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn-std btn-green" onclick="window.saveModal()">Guardar</button>
                <button class="btn-std btn-red" onclick="window.closeModal()">Sair</button>
            </div>
        </div>
    </div>

    <div class="app-footer">
        BT Manager © 2026 | Desenvolvido por <a href="https://instagram.com/lsibie" target="_blank">@LSIBIE</a>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
